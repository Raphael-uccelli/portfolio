<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Uccelli Raphaël</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="contact-page">
    <nav class="navbar navbar-expand-lg custom-nav fixed-top">
        <div class="container nav-shell">
            <div class="nav-top-row w-100">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Ouvrir le menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
            <div class="collapse navbar-collapse nav-menu-stack" id="navbarNav">
                <ul class="navbar-nav nav-links-group nav-pages ms-auto me-0">
                    <li class="nav-item"><a class="nav-link nav-pill" href="index.html">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link nav-pill" href="portfolio.html">Compétences & Projets</a></li>
                    <li class="nav-item"><a class="nav-link nav-pill active" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="portfolio-header text-center">
        <div class="container">
            <h1>Contact</h1>
            <p class="hero-subtitle">Écrivons-nous directement</p>
        </div>
    </header>

    <main class="container py-5">
        <section class="contact-layout">
            <article class="contact-card" id="cv">
                <h2>Télécharger mon CV</h2>
                <p>Tu peux télécharger mon CV au format PDF ici.</p>
                <a class="btn btn-primary custom-cta" href="cv_raphael_uccelli.pdf" download>Télécharger le CV</a>
            </article>

            <article class="contact-card" id="contact-message">
                <h2>M'envoyer un e-mail</h2>
                <form id="contactForm" action="https://formsubmit.co/uccelliraphael@gmail.com" method="POST" class="contact-form">
                    <input type="hidden" name="_subject" value="Nouveau message depuis le portfolio">
                    <input type="hidden" name="_template" value="table">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="contact.html">

                    <label for="name">Nom</label>
                    <input id="name" name="name" type="text" required placeholder="Ton nom">

                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" required placeholder="ton.email@exemple.com">

                    <label for="subject">Sujet</label>
                    <input id="subject" name="subject" type="text" required placeholder="Sujet du message">

                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" required placeholder="Écris ton message..."></textarea>

                    <button type="submit" class="btn btn-primary custom-cta">Envoyer</button>
                </form>
                <div id="contactFeedback" style="display:none;margin-top:0.8rem;
                    padding:0.65rem;border-radius:8px;font-weight:600;
                    "></div>
            </article>
        </section>
    </main>

    <footer class="text-center py-4">
        <p>&copy; 2026 Uccelli Raphaël</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function(){
            const form = document.getElementById('contactForm');
            const feedback = document.getElementById('contactFeedback');

            function showFeedback(text, ok = true){
                feedback.style.display = 'block';
                feedback.style.background = ok ? 'rgba(47,125,255,0.12)' : 'rgba(255,80,80,0.12)';
                feedback.style.color = ok ? 'var(--text-900)' : '#7a1b1b';
                feedback.textContent = text;
            }

            if(!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                showFeedback('Envoi en cours… Merci de patienter', true);

                const action = form.getAttribute('action');
                const formData = new FormData(form);

                // Try to send with fetch. If the remote server is down (network error / 521), fallback to mailto:
                try {
                    const resp = await fetch(action, {
                        method: 'POST',
                        body: formData,
                        // no-cors would make response opaque; prefer default and catch network errors
                    });

                    // If server responded with success (2xx) or other OK-ish, treat as success.
                    if (resp && (resp.ok || resp.type === 'opaque')) {
                        showFeedback('Message envoyé — merci !', true);
                        form.reset();
                        return;
                    }

                    // Non-ok response: show informative message and fallback
                    throw new Error('Réponse invalide du serveur');
                } catch (err) {
                    // Network error or server down: build mailto fallback
                    const name = formData.get('name') || '';
                    const email = formData.get('email') || '';
                    const subject = formData.get('subject') || 'Message depuis le portfolio';
                    const message = formData.get('message') || '';

                    const body = `Nom: ${name}%0D%0AEmail: ${email}%0D%0A%0D%0A${encodeURIComponent(message)}`;
                    const mailto = `mailto:uccelliraphael@gmail.com?subject=${encodeURIComponent(subject)}&body=${body}`;

                    showFeedback("Le service de formulaire est momentanément indisponible. Une fenêtre de messagerie va s'ouvrir pour envoyer votre message manuellement.", false);
                    // open mail client
                    window.location.href = mailto;
                }
            });
        })();
    </script>
</body>
</html>
